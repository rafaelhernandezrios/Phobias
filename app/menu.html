<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VR Phobia Exposure — Main Menu</title>
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <script>
    AFRAME.registerComponent('vr-raise-content', {
      schema: { offsetY: { type: 'number', default: 0.8 } },
      init: function () {
        var self = this;
        this.scene = this.el.sceneEl;
        this.scene.addEventListener('enter-vr', function () { self.el.setAttribute('position', '0 ' + self.data.offsetY + ' 0'); });
        this.scene.addEventListener('exit-vr', function () { self.el.setAttribute('position', '0 0 0'); });
      }
    });
    AFRAME.registerComponent('vr-camera-height', {
      schema: { height: { type: 'number', default: 2.0 } },
      tick: function () {
        if (this.el.sceneEl.is('vr-mode')) this.el.object3D.position.y = this.data.height;
      }
    });
    AFRAME.registerComponent('vr-world-offset', {
      schema: { offsetY: { type: 'number', default: -1.5 } },
      init: function () {
        var self = this;
        this.el.sceneEl.addEventListener('enter-vr', function () { self.el.setAttribute('position', '0 ' + self.data.offsetY + ' 0'); });
        this.el.sceneEl.addEventListener('exit-vr', function () { self.el.setAttribute('position', '0 0 0'); });
      }
    });
  </script>
  <link rel="stylesheet" href="css/shared.css" />
  <style>
    html, body { margin: 0; overflow: hidden; background: var(--bg-dark) !important; min-height: 100vh; }
    #ui-overlay {
      position: fixed; top: 0; left: 0; right: 0; padding: 12px 16px;
      background: rgba(10, 14, 20, 0.92); backdrop-filter: blur(12px);
      color: var(--text-primary); font-size: 14px; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border-subtle);
    }
    #ui-overlay span { color: var(--text-secondary); }
    #emergency-exit { padding: 8px 16px; background: var(--accent-danger); color: #fff; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: background 0.15s; }
    #emergency-exit:hover { background: var(--accent-danger-hover); }
    #toggle-2d { padding: 6px 12px; background: transparent; color: var(--accent-primary); border: 1px solid var(--accent-primary); border-radius: 8px; cursor: pointer; font-size: 13px; margin-right: 8px; }
    #toggle-2d:hover { background: rgba(91, 156, 245, 0.15); }
    a-scene { display: block; width: 100%; height: 100vh; }
    /* Modo 2D: grid de tarjetas para desktop */
    #menu-2d {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: var(--bg-dark); padding: 80px 24px 24px;
      overflow-y: auto;
    }
    #menu-2d.active { display: block; }
    #menu-2d .grid {
      max-width: 900px; margin: 0 auto;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px; justify-content: center;
    }
    #menu-2d .phobia-card-2d {
      background: var(--bg-card); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg); padding: 20px;
      cursor: pointer; transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      text-align: center;
    }
    #menu-2d .phobia-card-2d:hover {
      transform: translateY(-4px); border-color: var(--accent-primary);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    #menu-2d .phobia-card-2d h3 { margin: 0 0 4px; font-size: 1rem; color: var(--text-primary); }
    #menu-2d .phobia-card-2d .name-es { color: var(--accent-primary); font-size: 0.9rem; }
    #menu-2d .phobia-card-2d .desc { color: var(--text-muted); font-size: 0.8rem; margin-top: 4px; }
    #menu-2d .hint { text-align: center; color: var(--text-muted); font-size: 0.85rem; margin-top: 24px; }
    #video-hud { display: none; position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 16px; background: rgba(10,14,20,0.95); color: var(--text-primary); font-size: 14px; z-index: 150; border-top: 1px solid var(--border-subtle); }
    #video-hud.active { display: block; }
    #video-hud .hud-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    #video-hud .hud-btn { padding: 8px 14px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; color: #fff; }
    #video-hud .hud-btn-play { background: var(--accent-success); }
    #video-hud .hud-btn-pause { background: var(--accent-warning); color: #1a1a22; }
    #video-hud .hud-btn-menu { background: var(--border-hover); color: var(--text-primary); }
    #video-hud #emergency-exit-video { background: var(--accent-danger); }
    #video-hud #video-status.ready { color: var(--accent-success); }
  </style>
</head>
<body>
  <div id="ui-overlay">
    <span id="ui-title">Choose a phobia / 恐怖症を選択</span>
    <div>
      <button id="toggle-2d" type="button">Simple menu / シンプルメニュー</button>
      <!-- En vista VR: ir al experimento EEG (selección fobia/nivel en navegador; en VR solo el experimento, niveles con EEG) -->
      <a href="experiment.html" id="link-eeg-vr" style="display: none; padding: 8px 14px; background: var(--accent-primary); color: #fff; border-radius: 8px; font-weight: 600; text-decoration: none; margin-right: 8px;">EEG experiment / 実験モード</a>
      <button id="btn-enter-vr" type="button" style="display: none; padding: 8px 14px; background: var(--border-hover); color: var(--text-primary); border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-right: 8px;">Enter VR / VRに入る</button>
      <button id="emergency-exit" class="btn-emergency">EMERGENCY EXIT / 緊急終了</button>
    </div>
  </div>

  <!-- Modo 2D: grid clicable para usuarios sin VR -->

    <p class="hint">Click a phobia to choose intensity level. You can also use VR mode for an immersive experience.<br>恐怖症をクリックして強度レベルを選択。VRモードで没入体験も可能。</p>
  </div>

  <div id="video-hud">
    <div class="hud-row">
      <span id="video-status">Loading… / 読み込み中…</span>
      <span class="video-hint" style="color: var(--text-muted); font-size: 0.85rem;">VR: Use HUD buttons to control. / VRではHUDボタンで操作。</span>
      <div>
        <button class="hud-btn hud-btn-play" id="btn-video-play">▶ Play / 再生</button>
        <button class="hud-btn hud-btn-pause" id="btn-video-pause" style="display:none">⏸ Pause / 一時停止</button>
        <button class="hud-btn hud-btn-menu" id="btn-video-menu">← Menu / メニュー</button>
        <button class="hud-btn" id="emergency-exit-video">EMERGENCY EXIT / 緊急終了</button>
      </div>

      window._debugLog4789dd = [];
      window._debugSend = function(payload) {

        fetch('http://127.0.0.1:7669/ingest/4d1bafaf-811b-4191-aea0-48e25c1b589c',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'4789dd'},body:JSON.stringify(Object.assign({sessionId:'4789dd',timestamp:Date.now()},payload))}).catch(function(){});

  <script src="js/app-base.js"></script>

  <script>
    document.querySelector('a-scene').addEventListener('loaded', function () {
      var el = document.querySelector('a-scene');
      if (el && el.renderer) el.renderer.setClearColor(0x0a0e14);
      if (sessionStorage.getItem('vr_was_active') === '1') {
        sessionStorage.removeItem('vr_was_active');
        if (el && el.enterVR) setTimeout(function () { el.enterVR(); }, 400);
      }
    });
    (function () {
      // Sincroniza el entity con la muñeca para que el raycaster salga desde la mano
      AFRAME.registerComponent('hand-pose-sync', {
        tick: function () {
          var comp = this.el.components['hand-tracking-controls'];
          if (!comp || !comp.wristObject3D) return;
          var wrist = comp.wristObject3D;
          var parent = this.el.parentEl && this.el.parentEl.object3D;
          if (!parent) return;
          var THREE = AFRAME.THREE;
          var pos = this._pos || (this._pos = new THREE.Vector3());
          var quat = this._quat || (this._quat = new THREE.Quaternion());
          var parentQuat = this._parentQuat || (this._parentQuat = new THREE.Quaternion());
          wrist.getWorldPosition(pos);
          parent.worldToLocal(pos);
          this.el.object3D.position.copy(pos);
          wrist.getWorldQuaternion(quat);
          parent.getWorldQuaternion(parentQuat);
          this.el.object3D.quaternion.copy(quat).premultiply(parentQuat.clone().invert());
        }
      });

      AFRAME.registerComponent('hand-pinch-cursor', {
        init: function () {
          var self = this;
          this.el.addEventListener('pinchended', function () {
            var raycaster = self.el.components.raycaster;
            if (!raycaster) return;
            var els = raycaster.intersectedEls || (raycaster.intersections && raycaster.intersections.length ? [raycaster.intersections[0].object.el].filter(Boolean) : []);
            var target = els[0];
            if (!target) {
              // #region agent log
              if (window._debugSend) window._debugSend({location:'menu.html:pinch_no_target',message:'pinch_no_target',data:{intersectedElsLen:(raycaster.intersectedEls&&raycaster.intersectedEls.length)||0,intersectionsLen:(raycaster.intersections&&raycaster.intersections.length)||0},hypothesisId:'D'});
              // #endregion
              return;
            }
            while (target && !target.classList.contains('clickable')) target = target.parentEl;
            // #region agent log
            if (window._debugSend) window._debugSend({location:'menu.html:pinch_target',message:'pinch_target',data:{targetId:target?target.id||target.getAttribute('id')||'':'',isClickable:!!(target&&target.classList&&target.classList.contains('clickable'))},hypothesisId:'D'});
            // #endregion
            if (target) target.emit('click');
          });
        }
      });

      AFRAME.registerComponent('hand-laser-visual', {
        init: function () {
          var el = this.el;
          var rayLength = 5;
          this.rayLength = rayLength;
          this.lineEl = document.createElement('a-entity');
          this.lineEl.setAttribute('geometry', 'primitive: cylinder; radius: 0.006; height: ' + rayLength);
          this.lineEl.setAttribute('material', 'color: #00d4ff; opacity: 0.85; transparent: true; depthTest: false; depthWrite: false');
          this.lineEl.setAttribute('rotation', '90 0 0');
          this.lineEl.setAttribute('position', '0 0 ' + (-rayLength / 2));
          this.cursorEl = document.createElement('a-entity');
          this.cursorEl.setAttribute('geometry', 'primitive: ring; radiusInner: 0.015; radiusOuter: 0.025');
          this.cursorEl.setAttribute('material', 'color: #00d4ff; side: double; depthTest: false; depthWrite: false');
          this.cursorEl.setAttribute('rotation', '90 0 0');
          this.cursorEl.setAttribute('position', '0 0 -' + rayLength);
          el.appendChild(this.lineEl);
          el.appendChild(this.cursorEl);
        },
        tick: function () {
          var raycaster = this.el.components.raycaster;
          if (!raycaster) return;
          var dist = this.rayLength;
          if (raycaster.intersections && raycaster.intersections.length > 0 && raycaster.intersections[0].distance !== undefined) {
            dist = Math.min(raycaster.intersections[0].distance, this.rayLength);
          }
          this.lineEl.setAttribute('geometry', 'primitive: cylinder; radius: 0.006; height: ' + dist);
          this.lineEl.setAttribute('position', '0 0 ' + (-dist / 2));
          this.cursorEl.setAttribute('position', '0 0 -' + dist);
        }
      });

      AFRAME.registerComponent('reticle-on-top', {
        init: function () {
          var self = this;
          function setRenderOrder(obj) {
            if (obj.object3D) obj.object3D.renderOrder = 9999;
            if (obj.object3D && obj.object3D.traverse) {
              obj.object3D.traverse(function (o) {
                if (o.renderOrder !== undefined) o.renderOrder = 9999;
                if (o.material) {
                  if (o.material.depthTest !== undefined) o.material.depthTest = false;
                  if (o.material.depthWrite !== undefined) o.material.depthWrite = false;
                }
              });
            }
            if (obj.querySelectorAll) obj.querySelectorAll('*').forEach(setRenderOrder);
          }
          this.el.addEventListener('loaded', function () { setRenderOrder(self.el); });
          setRenderOrder(this.el);
        }
      });

      // Capa 1: dibujar encima del video (layer 0). Manos y retículo no quedan tapados por el 360.
      AFRAME.registerComponent('layer-over-video', {
        init: function () {
          var obj = this.el.object3D;
          if (!obj) return;
          obj.traverse(function (o) {
            if (o.layers) o.layers.set(1);
          });
        }
      });
      AFRAME.registerComponent('camera-enable-layer-1', {
        init: function () {
          var cam = this.el.components.camera && this.el.components.camera.camera;
          if (cam && cam.layers) cam.layers.enable(1);
        }
      });

      // Manos siempre visibles sobre el video 360 (depthTest: false + renderOrder alto)
      AFRAME.registerComponent('hand-always-visible', {
        _logged: false,
        tick: function () {
          var obj = this.el.object3D;
          if (!obj) return;
          var count = 0;
          obj.traverse(function (o) {
            if (o.isMesh && o.material && o.renderOrder !== 9998) {
              var mat = Array.isArray(o.material) ? o.material : [o.material];
              mat.forEach(function (m) {
                if (m) { m.depthTest = false; m.depthWrite = false; }
              });
              o.renderOrder = 9998;
              count++;
            }
          });
          // #region agent log
          if (count > 0 && !this._logged) {
            this._logged = true;
            var hand = this.el.getAttribute('hand') || (this.el.components['hand-tracking-controls'] && this.el.components['hand-tracking-controls'].data && this.el.components['hand-tracking-controls'].data.hand) || '?';
            if (window._debugSend) window._debugSend({location:'menu.html:hand-always-visible',message:'hand_meshes_modified',data:{hand:hand,meshCount:count},hypothesisId:'F'});
          }
          // #endregion
        }
      });
    })();
    document.getElementById('emergency-exit').addEventListener('click', function () {
      if (window.VRPhobiaLogger) VRPhobiaLogger.emergencyExit(null, null, 'user_triggered');
      window.location.href = 'index.html';
    });

    // Toggle modo 2D / VR — en desktop ancho, mostrar 2D por defecto (más fácil)
    var menu2d = document.getElementById('menu-2d');
    var toggle2d = document.getElementById('toggle-2d');
    var scene = document.querySelector('a-scene');
    var is2DActive = function () { return menu2d.classList.contains('active'); };
    var show2D = function () {
      menu2d.classList.add('active');
      toggle2d.textContent = 'View in VR / VRで表示';
      if (scene) scene.style.display = 'none';
      var btnVr = document.getElementById('btn-enter-vr');
      if (btnVr) btnVr.style.display = 'none';
      var linkEeg = document.getElementById('link-eeg-vr');
      if (linkEeg) linkEeg.style.display = 'none';
    };
    var showVR = function () {
      menu2d.classList.remove('active');
      toggle2d.textContent = 'Simple menu / シンプルメニュー';
      if (scene) scene.style.display = 'block';
      var btnVr = document.getElementById('btn-enter-vr');
      if (btnVr) btnVr.style.display = '';
      var linkEeg = document.getElementById('link-eeg-vr');
      if (linkEeg) linkEeg.style.display = '';
    };
    if (sessionStorage.getItem('vr_was_active') === '1') {
      showVR();
    } else if (window.innerWidth >= 768) {
      show2D();
    } else {
      showVR();
    }
    toggle2d.addEventListener('click', function () {
      if (is2DActive()) { showVR(); } else { show2D(); }
    });
    var btnEnterVr = document.getElementById('btn-enter-vr');
    if (btnEnterVr && scene) {
      btnEnterVr.addEventListener('click', function () {
        if (scene.enterVR) scene.enterVR();
      });
    }

    // Poblar grid 2D desde content.json
    fetch(typeof assetUrl === 'function' ? assetUrl('data/content.json') : 'data/content.json')
      .then(function (res) { return res.json(); })
      .then(function (data) {
        var grid = document.getElementById('phobia-grid-2d');
        if (!grid || !data.phobias) return;
        data.phobias.forEach(function (p) {
          var card = document.createElement('div');
          card.className = 'phobia-card-2d';
          card.setAttribute('data-phobia-id', p.id);
          var names = { arachnophobia: 'Arachnophobia / クモ恐怖症', claustrophobia: 'Claustrophobia / 閉所恐怖症', acrophobia: 'Acrophobia / 高所恐怖症', ophidiophobia: 'Ophidiophobia / 蛇恐怖症', entomophobia: 'Entomophobia / 昆虫恐怖症' };
          var descs = { arachnophobia: 'Fear of spiders / クモへの恐怖', claustrophobia: 'Enclosed spaces / 閉所への恐怖', acrophobia: 'Fear of heights / 高所への恐怖', ophidiophobia: 'Fear of snakes / ヘビへの恐怖', entomophobia: 'Fear of insects / 昆虫への恐怖' };
          card.innerHTML = '<h3>' + (names[p.id] || p.name || p.id) + '</h3><div class="name-es">' + (descs[p.id] || p.description || '') + '</div>';
          card.addEventListener('click', function () {
            var id = card.getAttribute('data-phobia-id');
            var name = (data.phobias.find(function (x) { return x.id === id; }) || {}).name || id;
            if (window.VRPhobiaLogger) VRPhobiaLogger.phobiaSelected(id, name);
            try {
              sessionStorage.setItem('vr_phobia_id', id);
              sessionStorage.setItem('vr_phobia_name', name);
            } catch (e) {}
            window.location.href = 'level-select.html';
          });
          grid.appendChild(card);
        });
      })
      .catch(function () {});

    var menuContent = document.getElementById('menu-content');
    var levelContent = document.getElementById('level-content');
    var videoContent = document.getElementById('video-content');
    var videoHud = document.getElementById('video-hud');
    var videoEl = document.getElementById('video360');
    var videoStatusEl = document.getElementById('video-status');
    var uiTitle = document.getElementById('ui-title');

    var levelPanelShownAt = 0;
    function showLevelPanel(phobiaId, phobiaName) {
      try { sessionStorage.setItem('vr_phobia_id', phobiaId); sessionStorage.setItem('vr_phobia_name', phobiaName); } catch (e) {}
      if (menuContent) menuContent.setAttribute('visible', false);
      if (levelContent) levelContent.setAttribute('visible', true);
      if (videoContent) videoContent.setAttribute('visible', false);
      if (videoHud) videoHud.classList.remove('active');
      var reticle = document.getElementById('video-reticle');
      if (reticle) reticle.setAttribute('visible', false);
      if (uiTitle) { uiTitle.style.display = ''; uiTitle.textContent = (phobiaName || phobiaId) + ' — Choose level (1–3) / レベル選択'; }
      levelPanelShownAt = Date.now();
    }
    function showMenuPanel() {
      if (menuContent) menuContent.setAttribute('visible', true);
      if (levelContent) levelContent.setAttribute('visible', false);
      if (videoContent) videoContent.setAttribute('visible', false);
      if (videoHud) videoHud.classList.remove('active');
      var reticle = document.getElementById('video-reticle');
      if (reticle) reticle.setAttribute('visible', false);
      if (uiTitle) { uiTitle.style.display = ''; uiTitle.textContent = 'Choose a phobia / 恐怖症を選択'; }
    }

    if (!AFRAME.components['video-texture-embed']) {
    AFRAME.registerComponent('video-texture-embed', {
      schema: { videoId: { default: 'video360' } },
      _lastTime: -1,
      tick: function () {
        var video = document.getElementById(this.data.videoId);
        var mesh = this.el.getObject3D('mesh');
        if (mesh && mesh.material && mesh.material.map && video && !video.paused) {
          var t = video.currentTime;
          if (t !== this._lastTime) { this._lastTime = t; mesh.material.map.needsUpdate = true; }
        }
        if (window._embedTextureApplied && !window._embedForceReapply) return;
        if (!video || video.readyState < 2) return;
        if (!mesh) return;
        var THREE = AFRAME.THREE;
        if (!THREE) return;
        var tex = new THREE.VideoTexture(video);
        tex.minFilter = THREE.LinearFilter;
        tex.magFilter = THREE.LinearFilter;
        tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
        try { if (THREE.sRGBEncoding) tex.encoding = THREE.sRGBEncoding; } catch (e) {}
        var mat = new THREE.MeshBasicMaterial({ map: tex, color: 0xffffff, side: THREE.BackSide, depthWrite: true, depthTest: true });
        if (mesh.material && mesh.material.dispose) mesh.material.dispose();
        mesh.material = mat;
        window._embedTextureApplied = true;
        window._embedForceReapply = false;
        if (videoStatusEl) { videoStatusEl.textContent = 'Press Play / 再生をクリック'; videoStatusEl.classList.add('ready'); }
        video.play().catch(function () {});
      }
    });
    }

    function showVideoPanel(phobiaId, phobiaName, level, videoId) {
      if (levelContent) levelContent.setAttribute('visible', false);
      if (videoContent) videoContent.setAttribute('visible', true);
      if (videoHud) videoHud.classList.add('active');
      var reticle = document.getElementById('video-reticle');
      if (reticle) reticle.setAttribute('visible', true);
      if (uiTitle) uiTitle.style.display = 'none';
      // #region agent log
      if (window._debugSend) window._debugSend({location:'menu.html:showVideoPanel',message:'showVideoPanel',data:{phobiaId:phobiaId,level:level,videoContentVisible:!!(videoContent&&videoContent.getAttribute('visible')!=='false'),reticleVisible:!!(reticle&&reticle.getAttribute('visible')!=='false')},hypothesisId:'E'});
      // #endregion
      var cam = document.getElementById('cam');
      if (cam && cam.components.raycaster && cam.components.raycaster.refreshObjects) {
        cam.components.raycaster.refreshObjects();
        setTimeout(function () { if (cam.components.raycaster && cam.components.raycaster.refreshObjects) cam.components.raycaster.refreshObjects(); }, 100);
      }
      window._embedTextureApplied = false;
      window._embedForceReapply = true;
      if (videoStatusEl) { videoStatusEl.textContent = 'Loading… / 読み込み中…'; videoStatusEl.classList.remove('ready'); }
      var dataUrl = typeof assetUrl === 'function' ? assetUrl('data/content.json') : 'data/content.json';
      fetch(dataUrl).then(function (r) { return r.json(); }).then(function (data) {
        var phobia = data.phobias && data.phobias.find(function (p) { return p.id === phobiaId; });
        var lvl = phobia && phobia.levels && phobia.levels.find(function (l) { return l.level_number === level; });
        var url = lvl ? lvl.video_url_360 : null;
        var fullUrl = url ? (typeof assetUrl === 'function' ? assetUrl(url) : url) : 'assets/videos/baseline.mp4';
        videoEl.setAttribute('src', fullUrl);
        videoEl.muted = true;
        videoEl.load();
        videoEl.addEventListener('error', function () { if (videoStatusEl) videoStatusEl.textContent = 'Error / エラー'; });
        function playWhenReady() {
          videoEl.removeEventListener('canplay', playWhenReady);
          videoEl.removeEventListener('loadeddata', playWhenReady);
          window._embedForceReapply = true;
          videoEl.play().catch(function () {});
        }
        videoEl.addEventListener('canplay', playWhenReady);
        videoEl.addEventListener('loadeddata', playWhenReady);
        if (videoEl.readyState >= 2) playWhenReady();
      }).catch(function () { if (videoStatusEl) videoStatusEl.textContent = 'Error / エラー'; });
      if (scene && scene.is && scene.is('vr-mode') && videoEl.readyState >= 2) {
        window._embedForceReapply = true;
        videoEl.play().catch(function () {});
      }
    }

    document.getElementById('btn-video-play').addEventListener('click', function () {
      if (videoEl) { videoEl.muted = false; videoEl.play(); }
      document.getElementById('btn-video-play').style.display = 'none';
      document.getElementById('btn-video-pause').style.display = 'inline-block';
    });
    document.getElementById('btn-video-pause').addEventListener('click', function () {
      if (videoEl) videoEl.pause();
      document.getElementById('btn-video-play').style.display = 'inline-block';
      document.getElementById('btn-video-pause').style.display = 'none';
    });
    document.getElementById('btn-video-menu').addEventListener('click', function () {
      if (videoEl) videoEl.pause();
      showLevelPanel(sessionStorage.getItem('vr_phobia_id'), sessionStorage.getItem('vr_phobia_name'));
    });
    document.getElementById('emergency-exit-video').addEventListener('click', function () {
      if (videoEl) videoEl.pause();
      if (window.VRPhobiaLogger) VRPhobiaLogger.emergencyExit(null, null, 'user_triggered');
      window.location.href = 'index.html';
    });

    function onPhobiaCardClick() {
      var card = this;
      while (card && !card.classList.contains('phobia-card')) card = card.parentEl;
      if (!card) return;
      var id = card.getAttribute('data-phobia-id');
      var name = card.getAttribute('data-phobia-name');
      if (window.VRPhobiaLogger) VRPhobiaLogger.phobiaSelected(id, name);
      showLevelPanel(id, name);
    }
    function onLevelCardClick() {
      if (Date.now() - levelPanelShownAt < 500) return;
      var card = this;
      while (card && !card.classList.contains('level-card')) card = card.parentEl;
      if (!card) return;
      var level = parseInt(card.getAttribute('data-level'), 10);
      var phobiaId = sessionStorage.getItem('vr_phobia_id');
      var videoId = (phobiaId || '') + '_level' + level;
      if (window.VRPhobiaLogger) VRPhobiaLogger.levelSelected(phobiaId, level, videoId);
      try {
        sessionStorage.setItem('vr_level', level);
        sessionStorage.setItem('vr_video_id', videoId);
      } catch (e) {}
      showVideoPanel(phobiaId, sessionStorage.getItem('vr_phobia_name'), level, videoId);
    }
    function onBackClick() {
      var btn = this;
      while (btn && !btn.classList.contains('vr-back-btn')) btn = btn.parentEl;
      if (btn) showMenuPanel();
    }

    document.querySelectorAll('.phobia-card').forEach(function (card) {
      card.addEventListener('click', onPhobiaCardClick);
      card.querySelectorAll('.clickable').forEach(function (el) { el.addEventListener('click', onPhobiaCardClick); });
    });
    document.querySelectorAll('.level-card').forEach(function (card) {
      card.addEventListener('click', onLevelCardClick);
      card.querySelectorAll('.clickable').forEach(function (el) { el.addEventListener('click', onLevelCardClick); });
    });
    document.querySelectorAll('.vr-back-btn').forEach(function (btn) {
      btn.addEventListener('click', onBackClick);
      btn.querySelectorAll('.clickable').forEach(function (el) { el.addEventListener('click', onBackClick); });
    });

    function applyThumbnailToCard(phobia, scene) {
      var card = document.getElementById('card-' + phobia.id);
      if (!card || !phobia.thumbnail) return;
      var url = typeof assetUrl === 'function' ? assetUrl(phobia.thumbnail) : phobia.thumbnail;
      var plane = card.querySelector('a-plane');
      if (!plane) return;
      var retries = 0;
      function setTexture(img) {
        var mesh = plane.getObject3D('mesh');
        if (!mesh) {
          if (scene.hasLoaded && retries++ < 25) setTimeout(function () { setTexture(img); }, 60);
          return;
        }
        var THREE = AFRAME.THREE;
        if (!THREE) return;
        var tex = new THREE.Texture(img);
        tex.needsUpdate = true;
        tex.minFilter = THREE.LinearFilter;
        tex.magFilter = THREE.LinearFilter;
        tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
        var newMat = new THREE.MeshBasicMaterial({
          map: tex,
          color: 0xffffff,
          side: THREE.DoubleSide,
          depthWrite: true,
          depthTest: true
        });
        if (mesh.material) {
          if (mesh.material.map) mesh.material.map.dispose();
          mesh.material.dispose();
        }
        mesh.material = newMat;
      }
      var img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = function () {
        var doApply = function () { setTexture(img); };
        if (img.decode) { img.decode().then(doApply).catch(doApply); } else { requestAnimationFrame(doApply); }
      };
      img.onerror = function () { plane.setAttribute('material', { src: url, color: '#fff' }); };
      img.src = url;
    }
    fetch(typeof assetUrl === 'function' ? assetUrl('data/content.json') : 'data/content.json')
      .then(function (res) { return res.json(); })
      .then(function (data) {
        if (!data.phobias) return;
        var scene = document.querySelector('a-scene');
        function applyAll() {
          setTimeout(function () {
            data.phobias.forEach(function (phobia) { applyThumbnailToCard(phobia, scene); });
          }, 150);
        }
        if (scene.hasLoaded) { applyAll(); } else { scene.addEventListener('loaded', applyAll); }
      })
      .catch(function () {});
  </script>
</body>
</html>

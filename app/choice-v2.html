<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VR Phobia — Choose mode</title>
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <script>
    AFRAME.registerComponent('vr-camera-height', {
      schema: { height: { type: 'number', default: 2.0 } },
      tick: function () {
        if (this.el.sceneEl.is && this.el.sceneEl.is('vr-mode')) this.el.object3D.position.y = this.data.height;
      }
    });
    AFRAME.registerComponent('hand-pose-sync', {
      tick: function () {
        var comp = this.el.components['hand-tracking-controls'];
        if (!comp || !comp.wristObject3D) return;
        var wrist = comp.wristObject3D;
        var parent = this.el.parentEl && this.el.parentEl.object3D;
        if (!parent) return;
        var THREE = AFRAME.THREE;
        var pos = this._pos || (this._pos = new THREE.Vector3());
        var quat = this._quat || (this._quat = new THREE.Quaternion());
        var parentQuat = this._parentQuat || (this._parentQuat = new THREE.Quaternion());
        wrist.getWorldPosition(pos);
        parent.worldToLocal(pos);
        this.el.object3D.position.copy(pos);
        wrist.getWorldQuaternion(quat);
        parent.getWorldQuaternion(parentQuat);
        this.el.object3D.quaternion.copy(quat).premultiply(parentQuat.clone().invert());
      }
    });
    AFRAME.registerComponent('hand-pinch-cursor', {
      init: function () {
        var self = this;
        this.el.addEventListener('pinchended', function () {
          var raycaster = self.el.components.raycaster;
          if (!raycaster) return;
          var els = raycaster.intersectedEls || (raycaster.intersections && raycaster.intersections.length ? [raycaster.intersections[0].object.el].filter(Boolean) : []);
          var target = els[0];
          if (!target) return;
          while (target && !target.classList.contains('clickable')) target = target.parentEl;
          if (target) target.emit('click');
        });
      }
    });
    AFRAME.registerComponent('hand-laser-visual', {
      init: function () {
        var el = this.el;
        var rayLength = 8;
        this.rayLength = rayLength;
        this.lineEl = document.createElement('a-entity');
        this.lineEl.setAttribute('geometry', 'primitive: cylinder; radius: 0.006; height: ' + rayLength);
        this.lineEl.setAttribute('material', 'color: #00d4ff; opacity: 0.85; transparent: true');
        this.lineEl.setAttribute('rotation', '90 0 0');
        this.lineEl.setAttribute('position', '0 0 ' + (-rayLength / 2));
        this.cursorEl = document.createElement('a-entity');
        this.cursorEl.setAttribute('geometry', 'primitive: ring; radiusInner: 0.015; radiusOuter: 0.025');
        this.cursorEl.setAttribute('material', 'color: #00d4ff; side: double');
        this.cursorEl.setAttribute('rotation', '90 0 0');
        this.cursorEl.setAttribute('position', '0 0 -' + rayLength);
        el.appendChild(this.lineEl);
        el.appendChild(this.cursorEl);
      },
      tick: function () {
        var raycaster = this.el.components.raycaster;
        if (!raycaster) return;
        var dist = this.rayLength;
        if (raycaster.intersections && raycaster.intersections.length > 0 && raycaster.intersections[0].distance !== undefined) {
          dist = Math.min(raycaster.intersections[0].distance, this.rayLength);
        }
        this.lineEl.setAttribute('geometry', 'primitive: cylinder; radius: 0.006; height: ' + dist);
        this.lineEl.setAttribute('position', '0 0 ' + (-dist / 2));
        this.cursorEl.setAttribute('position', '0 0 -' + dist);
      }
    });
  </script>
  <link rel="stylesheet" href="css/shared.css" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100vh; overflow-x: hidden; }
    #choice-2d {
      position: fixed; inset: 0; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: clamp(1rem, 4vw, 2rem); background: var(--bg-dark); color: var(--text-primary);
    }
    #choice-2d.hidden { display: none; }
    .choice-card {
      width: 100%; max-width: 520px;
      background: var(--bg-card); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg); padding: clamp(1.5rem, 4vw, 2.5rem);
      text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    .choice-card h1 { font-size: clamp(1.2rem, 2.5vw, 1.5rem); margin: 0 0 1rem; color: var(--text-primary); }
    .choice-card p { color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 1.5rem; }
    .btn-row { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; }
    .btn-row .btn { min-width: 200px; }
    .btn-vr-toggle { margin-top: 1rem; background: transparent; color: var(--accent-primary); border: 1px solid var(--accent-primary); }
    .btn-vr-toggle:hover { background: rgba(91, 156, 245, 0.15); }
    a-scene { display: block; width: 100%; height: 100vh; }
  </style>
</head>
<body>
  <!-- Vista 2D -->
  <div id="choice-2d">
    <div class="choice-card">
      <h1>Choose mode / モードを選択</h1>
      <p>Experiment EEG (adaptive levels) or Phobias test (choose phobia and level).<br>実験EEG（適応レベル）または恐怖症テスト（恐怖症・レベルを選択）。</p>
      <div class="btn-row">
        <a href="experiment.html" class="btn btn-primary" style="text-decoration: none;">Experiment EEG / 実験EEG</a>
        <a href="menu.html" class="btn btn-outline" style="text-decoration: none;">Phobias test / 恐怖症テスト</a>
      </div>
      <button type="button" class="btn btn-vr-toggle" id="btn-view-vr">View in VR / VRで見る</button>
    </div>
  </div>

  <!-- Escena VR: mismo contenido, dos botones grandes -->
  <a-scene id="scene-vr" embedded background="color: #0a0e14">
    <a-entity id="cam-rig" position="0 1.6 0" vr-camera-height="height: 2.0">
      <a-entity id="cam" camera look-controls position="0 0 0" cursor="rayOrigin: mouse; fuse: true; fuseTimeout: 2000; fuseLength: 0.5" raycaster="objects: .clickable; far: 10">
        <a-entity id="reticle" position="0 0 -0.8">
          <a-ring radius-inner="0.012" radius-outer="0.03" color="#00d4ff" material="side: double; transparent: true; opacity: 0.95; depthTest: false; depthWrite: false"></a-ring>
          <a-circle radius="0.006" color="#fff" position="0 0 0.001" material="side: double; depthTest: false; depthWrite: false"></a-circle>
        </a-entity>
      </a-entity>
      <a-entity hand-tracking-controls="hand: left; modelStyle: mesh" raycaster="objects: .clickable; far: 8" hand-pose-sync hand-pinch-cursor hand-laser-visual position="0 0 0"></a-entity>
      <a-entity hand-tracking-controls="hand: right; modelStyle: mesh" raycaster="objects: .clickable; far: 8" hand-pose-sync hand-pinch-cursor hand-laser-visual position="0 0 0"></a-entity>
    </a-entity>

    <a-sky color="#0a0e14"></a-sky>

    <a-entity id="choice-panel" position="0 3.5 -2" rotation="0 0 0">
      <a-text value="Choose mode / モードを選択" anchor="center" align="center" position="0 0.5 0" width="3" color="#f0f2f5" font-size="0.24"></a-text>
      <a-text value="Experiment EEG or Phobias test" anchor="center" align="center" position="0 0.25 0" width="2.8" color="#a0a8b4" font-size="0.1"></a-text>

      <a-entity id="btn-eeg-vr" position="-0.55 -0.2 0" data-action="eeg">
        <a-plane width="0.72" height="0.22" color="#2d4a6e" position="0 0 -0.008" material="side: double"></a-plane>
        <a-plane width="0.68" height="0.2" color="#5b9cf5" position="0 0 0" material="side: double" class="clickable"></a-plane>
        <a-text value="Experiment EEG" anchor="center" align="center" position="0 0 0.02" width="0.65" color="#ffffff" font-size="0.11"></a-text>
      </a-entity>
      <a-entity id="btn-phobias-vr" position="0.55 -0.2 0" data-action="phobias">
        <a-plane width="0.72" height="0.22" color="#0d1117" position="0 0 -0.008" material="side: double"></a-plane>
        <a-plane width="0.68" height="0.2" color="#1a2332" position="0 0 0" material="side: double; metalness: 0.2; roughness: 0.8" class="clickable"></a-plane>
        <a-text value="Phobias test" anchor="center" align="center" position="0 0 0.02" width="0.6" color="#8ab4f8" font-size="0.11"></a-text>
      </a-entity>
    </a-entity>

    <a-light type="ambient" intensity="0.7"></a-light>
    <a-light type="directional" position="0 2 2" intensity="0.5"></a-light>
  </a-scene>

  <script>
    (function () {
      var scene = document.getElementById('scene-vr');
      var overlay = document.getElementById('choice-2d');

      function goExperiment() { window.location.href = 'experiment.html'; }
      function goPhobias() { window.location.href = 'menu.html'; }

      document.getElementById('btn-view-vr').addEventListener('click', function () {
        if (!scene || !scene.enterVR) return;
        overlay.classList.add('hidden');
        scene.enterVR();
      });

      if (scene) {
        scene.addEventListener('enter-vr', function () {
          var cam = document.getElementById('cam');
          if (cam && cam.components.raycaster && cam.components.raycaster.refreshObjects) cam.components.raycaster.refreshObjects();
          [].forEach.call(document.querySelectorAll('[hand-tracking-controls]'), function (hand) {
            if (hand.components.raycaster && hand.components.raycaster.refreshObjects) hand.components.raycaster.refreshObjects();
          });
        });
        scene.addEventListener('exit-vr', function () { overlay.classList.remove('hidden'); });
      }

      function onVrButtonClick(evt) {
        var el = evt.target;
        while (el && el.getAttribute && !el.getAttribute('data-action')) el = el.parentEl;
        if (!el || !el.getAttribute('data-action')) return;
        var action = el.getAttribute('data-action');
        if (action === 'eeg') goExperiment();
        else if (action === 'phobias') goPhobias();
      }
      ['btn-eeg-vr', 'btn-phobias-vr'].forEach(function (id) {
        var el = document.getElementById(id);
        if (el) {
          el.addEventListener('click', onVrButtonClick);
          el.querySelectorAll('a-plane').forEach(function (p) { p.addEventListener('click', onVrButtonClick); });
        }
      });
    })();
  </script>
</body>
</html>

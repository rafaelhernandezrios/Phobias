<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VR Phobia Exposure — Waiting for Configuration</title>
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <link rel="stylesheet" href="css/shared.css" />
  <style>
    html, body { margin: 0; overflow: hidden; background: var(--bg-dark) !important; min-height: 100vh; }

    #waiting-screen {
      position: fixed; inset: 0; z-index: 250;
      background: var(--bg-dark);
      color: var(--text-primary);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      text-align: center;
    }
    #waiting-screen.hidden { display: none; }

    #waiting-card {
      max-width: 720px;
      border: 1px solid var(--border-subtle);
      background: rgba(20, 25, 34, 0.92);
      border-radius: var(--radius-lg);
      padding: 32px 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    #waiting-title {
      font-size: 2rem;
      margin: 0 0 12px 0;
      font-weight: 800;
    }
    #waiting-subtitle {
      color: var(--text-muted);
      margin: 0 0 18px 0;
      line-height: 1.5;
    }
    #ws-status {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 0.95rem;
      background: rgba(255,255,255,0.04);
      color: var(--text-secondary);
    }
    #ws-status.connected { background: rgba(74, 222, 128, 0.2); color: var(--accent-success); }
    #ws-status.disconnected { background: rgba(239, 68, 68, 0.2); color: var(--accent-danger); }
    #ws-status.connecting { background: rgba(251, 191, 36, 0.2); color: var(--accent-warning); }

    #video-hud.hidden { display: none; }
    #video-hud {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 12px 16px;
      background: rgba(10, 14, 20, 0.95);
      backdrop-filter: blur(12px);
      color: var(--text-primary);
      font-size: 14px;
      z-index: 120;
      border-top: 1px solid var(--border-subtle);
    }
    #progress-bar {
      position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: var(--bg-elevated);
    }
    #progress-bar-fill { height: 100%; background: var(--accent-primary); width: 0%; transition: width 0.1s linear; }
    #hud-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; padding-top: 4px; }
    #hud-left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    #hud-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    #level-badge { padding: 6px 12px; border-radius: 8px; font-weight: 700; font-size: 0.9rem; }
    #level-badge.level-1 { background: rgba(74, 222, 128, 0.18); color: var(--level-1); }
    #level-badge.level-2 { background: rgba(251, 191, 36, 0.18); color: var(--level-2); }
    #level-badge.level-3 { background: rgba(239, 68, 68, 0.18); color: var(--level-3); }
    #level-badge.level-0 { background: rgba(107, 114, 128, 0.18); color: var(--text-muted); }
    /* Level 4/5 colors will be themed by shared.css when added; fallback to level-3 styling */
    #level-badge.level-4 { background: rgba(249, 115, 22, 0.18); color: var(--level-4); }
    #level-badge.level-5 { background: rgba(139, 92, 246, 0.18); color: var(--level-5); }
    #phobia-label { color: var(--text-secondary); }
    #video-status { color: var(--accent-primary); margin-left: 6px; font-size: 0.9rem; }
    #video-status.ready { color: var(--accent-success); }
    #video-status.error { color: var(--accent-danger); }
    #time-display { color: var(--text-muted); font-size: 0.85rem; font-variant-numeric: tabular-nums; }
    #fear-index-display { color: var(--accent-primary); font-size: 0.85rem; font-variant-numeric: tabular-nums; }

    .hud-btn {
      padding: 8px 14px; border-radius: 8px; border: none;
      font-weight: 700; cursor: pointer; color: #fff;
      transition: transform 0.15s, opacity 0.15s;
    }
    .hud-btn:hover { transform: translateY(-1px); }
    .hud-btn-menu { background: var(--border-hover); color: var(--text-primary); }
    #emergency-exit { background: var(--accent-danger); }
    #emergency-exit:hover { background: var(--accent-danger-hover); }

    a-scene { display: block; width: 100%; height: 100vh; position: relative; z-index: 0; }
  </style>
</head>
<body>
  <div id="waiting-screen">
    <div id="waiting-card">
      <div id="waiting-title">Waiting for Configuration / 設定待ち</div>
      <p id="waiting-subtitle">
        Please keep the app open.<br>
        アプリを開いたままお待ちください。
      </p>
      <div id="ws-status" class="ws-status disconnected">WebSocket: Disconnected</div>
    </div>
  </div>

  <div id="video-hud" class="hidden">
    <div id="progress-bar"><div id="progress-bar-fill"></div></div>
    <div id="hud-inner">
      <div id="hud-left">
        <span id="level-badge" class="level-1">Level 1</span>
        <span id="phobia-label">—</span>
        <span id="video-status">Loading…</span>
        <span id="time-display">0:00 / 0:00</span>
        <span id="fear-index-display" title="Fear/Engagement index (EEG)">—</span>
      </div>
      <div id="hud-right">
        <button class="hud-btn" id="emergency-exit" type="button">EMERGENCY EXIT / 緊急終了</button>
      </div>
    </div>
  </div>

  <video id="video360" loop="false" preload="auto" playsinline muted style="display:none"></video>

  <a-scene embedded background="color: #0a0a12" id="main-scene">
    <a-entity id="camera-rig" position="0 1.6 0" vr-camera-height="minHeight: 1.5">
      <a-entity id="main-camera" camera look-controls position="0 0 0"></a-entity>
    </a-entity>

    <a-entity id="waiting-vr" position="0 2.6 -1.8" visible="true">
      <a-text value="Waiting for Configuration / 設定待ち" anchor="center" align="center"
        width="3.4" color="#f0f2f5" font-size="0.23"></a-text>
    </a-entity>

    <a-entity id="video-world" vr-world-offset="offsetY: -1.5" visible="false">
      <a-videosphere id="videosphere" radius="500" rotation="0 -90 0"
        material="side: back; color: #111"
        video-texture-on-ready="videoId: video360"></a-videosphere>
      <a-light type="ambient" intensity="0.3"></a-light>
    </a-entity>

    <a-light type="ambient" intensity="0.7"></a-light>
    <a-light type="directional" position="0 2 2" intensity="0.5"></a-light>
  </a-scene>

  <script src="js/app-base.js"></script>
  <script>
    (function () {
      // Basic VR helpers (copied/trimmed from other pages where needed).
      AFRAME.registerComponent('vr-camera-height', {
        schema: { minHeight: { type: 'number', default: 1.5 } },
        tick: function () {
          if (!this.el.sceneEl.is('vr-mode')) return;
          var y = this.el.object3D.position.y;
          if (y < this.data.minHeight) this.el.object3D.position.y = this.data.minHeight;
        }
      });

      AFRAME.registerComponent('vr-world-offset', {
        schema: { offsetY: { type: 'number', default: -1.5 } },
        init: function () {
          var self = this;
          this.el.sceneEl.addEventListener('enter-vr', function () {
            self.el.setAttribute('position', '0 ' + self.data.offsetY + ' 0');
          });
          this.el.sceneEl.addEventListener('exit-vr', function () {
            self.el.setAttribute('position', '0 0 0');
          });
        }
      });

      function getWsUrl() {
        var WS_PORT = 8765;
        var protocol = (window.location.protocol === 'https:') ? 'wss:' : 'ws:';
        return protocol + '//' + window.location.hostname + ':' + WS_PORT;
      }

      window._playerTextureApplied = false;
      window._playerForceReapply = false;

      AFRAME.registerComponent('video-texture-on-ready', {
        schema: { videoId: { default: 'video360' } },
        _lastTime: -1,
        tick: function () {
          var video = document.getElementById(this.data.videoId);
          var mesh = this.el.getObject3D('mesh');
          if (mesh && mesh.material && mesh.material.map && video && !video.paused) {
            var t = video.currentTime;
            if (t !== this._lastTime) {
              this._lastTime = t;
              mesh.material.map.needsUpdate = true;
            }
          }
          if (window._playerTextureApplied && !window._playerForceReapply) return;
          if (!video || video.readyState < 2) return;
          if (!mesh) return;

          var THREE = AFRAME.THREE;
          if (!THREE) return;
          var tex = new THREE.VideoTexture(video);
          tex.minFilter = THREE.LinearFilter;
          tex.magFilter = THREE.LinearFilter;
          tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
          try { if (THREE.sRGBEncoding) tex.encoding = THREE.sRGBEncoding; } catch (e) {}
          var material = new THREE.MeshBasicMaterial({
            map: tex,
            color: 0xffffff,
            side: THREE.BackSide,
            depthWrite: true,
            depthTest: true
          });
          if (mesh.material && mesh.material.dispose) mesh.material.dispose();
          mesh.material = material;

          window._playerTextureApplied = true;
          window._playerForceReapply = false;
        }
      });

      var waitingScreen = document.getElementById('waiting-screen');
      var waitingVr = document.getElementById('waiting-vr');
      var videoHud = document.getElementById('video-hud');
      var wsStatusEl = document.getElementById('ws-status');
      var videoEl = document.getElementById('video360');
      var statusEl = document.getElementById('video-status');
      var progressFill = document.getElementById('progress-bar-fill');
      var timeDisplay = document.getElementById('time-display');
      var badgeEl = document.getElementById('level-badge');
      var phobiaLabelEl = document.getElementById('phobia-label');
      var fearIndexEl = document.getElementById('fear-index-display');
      var videosphereWorld = document.getElementById('video-world');

      var phobiaId = null;
      var phobiaName = null;
      var currentLevel = 1;
      var ws = null;
      var contentData = null;
      var contentDataPromise = null;
      var autoAdaptationEnabled = true;
      var experimentId = null;
      var durationSeconds = null;
      var stopTimer = null;

      var COOLDOWN_UP_MS = 45000;
      var COOLDOWN_DOWN_MS = 20000;
      var HYSTERESIS_COUNT = 2;
      var lastLevelChangeTs = 0;
      var consecutiveUp = 0;
      var consecutiveDown = 0;

      function setWsStatus(klass, text) {
        if (!wsStatusEl) return;
        wsStatusEl.className = 'ws-status ' + klass;
        wsStatusEl.textContent = text;
      }

      function formatTime(s) {
        var m = Math.floor(s / 60);
        var sec = Math.floor(s % 60);
        return m + ':' + (sec < 10 ? '0' : '') + sec;
      }

      function updateProgress() {
        if (!videoEl || !progressFill) return;
        var pct = (videoEl.duration > 0) ? (videoEl.currentTime / videoEl.duration) * 100 : 0;
        progressFill.style.width = pct + '%';
        if (timeDisplay) timeDisplay.textContent = formatTime(videoEl.currentTime) + ' / ' + formatTime(videoEl.duration || 0);
      }

      function showWaitingUI() {
        if (stopTimer) { clearTimeout(stopTimer); stopTimer = null; }
        if (videoEl) { try { videoEl.pause(); } catch (e) {} }
        if (videoHud) videoHud.classList.add('hidden');
        if (waitingScreen) waitingScreen.classList.remove('hidden');
        if (waitingVr) waitingVr.setAttribute('visible', true);
        if (videosphereWorld) videosphereWorld.setAttribute('visible', false);
        if (statusEl) statusEl.textContent = 'Waiting…';
        if (progressFill) progressFill.style.width = '0%';
        if (timeDisplay) timeDisplay.textContent = '0:00 / 0:00';
        if (fearIndexEl) fearIndexEl.textContent = '—';
      }

      function showExperimentUI() {
        if (waitingScreen) waitingScreen.classList.add('hidden');
        if (waitingVr) waitingVr.setAttribute('visible', false);
        if (videoHud) videoHud.classList.remove('hidden');
        if (videosphereWorld) videosphereWorld.setAttribute('visible', true);
      }

      function getVideoUrlForLevel(level, cb) {
        if (!contentData || !phobiaId) { cb(null); return; }
        // Baseline is represented as level 0.
        if (level === 0) {
          // Backward compatibility: older flows might use phobiaId === "baseline".
          if (phobiaId === 'baseline' && contentData.baseline) {
            cb(contentData.baseline.video_url_360 || null);
            return;
          }
          var phobia0 = contentData.phobias && contentData.phobias.find(function (p) { return p.id === phobiaId; });
          if (phobia0 && phobia0.baseline && phobia0.baseline.video_url_360) {
            cb(phobia0.baseline.video_url_360);
            return;
          }
          // Fallback: use the nearest available non-baseline level.
          if (phobia0 && phobia0.levels && phobia0.levels.length) {
            var best0 = phobia0.levels.slice().sort(function (a,b){ return a.level_number - b.level_number; })[0];
            cb(best0 && best0.video_url_360 ? best0.video_url_360 : null);
            return;
          }
          cb(null);
          return;
        }

        var phobia = contentData.phobias && contentData.phobias.find(function (p) { return p.id === phobiaId; });
        var lvl = phobia && phobia.levels && phobia.levels.find(function (l) { return l.level_number === level; });
        if (lvl && lvl.video_url_360) { cb(lvl.video_url_360); return; }

        // Fallback: use nearest available level video.
        if (phobia && phobia.levels && phobia.levels.length) {
          var sorted = phobia.levels.slice().sort(function (a,b){ return a.level_number - b.level_number; });
          var best = sorted[0];
          for (var i = 0; i < sorted.length; i++) {
            if (sorted[i].level_number <= level) best = sorted[i];
          }
          cb(best && best.video_url_360 ? best.video_url_360 : null);
          return;
        }
        cb(null);
      }

      function loadVideoForLevel(level, autoPlay) {
        getVideoUrlForLevel(level, function (url) {
          var rawUrl = url || (contentData && contentData.baseline && contentData.baseline.video_url_360) || 'assets/videos/baseline.mp4';
          var fullUrl = (typeof assetUrl === 'function') ? assetUrl(rawUrl) : rawUrl;

          if (statusEl) {
            statusEl.textContent = 'Loading level ' + level + '…';
            statusEl.classList.remove('ready');
            statusEl.classList.remove('error');
          }

          // Force texture refresh on new src.
          window._playerTextureApplied = false;
          window._playerForceReapply = true;

          if (videoEl) {
            videoEl.muted = true; // keep muted for autoplay reliability
            videoEl.setAttribute('src', fullUrl);
            videoEl.load();
          }

          if (!videoEl) return;

          videoEl.addEventListener('loadeddata', function onLoaded() {
            videoEl.removeEventListener('loadeddata', onLoaded);
            if (statusEl) {
              statusEl.textContent = autoPlay ? 'Playing…' : 'Ready';
              statusEl.classList.add('ready');
            }
            if (autoPlay) {
              try {
                var p = videoEl.play();
                if (p && p.catch) {
                  p.catch(function () {
                    if (statusEl) {
                      statusEl.textContent = 'Autoplay blocked. Press Play in your browser controls.';
                      statusEl.classList.add('error');
                    }
                  });
                }
              } catch (e) {
                if (statusEl) statusEl.textContent = 'Autoplay failed';
              }
            }
          }, { once: true });

          videoEl.addEventListener('error', function () {
            if (statusEl) {
              statusEl.textContent = 'Error loading video';
              statusEl.classList.add('error');
            }
          }, { once: true });
        });
      }

      function setLevelTo(targetLevel, sendLevelChange) {
        var lvl = parseInt(targetLevel, 10);
        if (isNaN(lvl) || lvl < 0 || lvl > 5) return;
        if (lvl === currentLevel) return;

        lastLevelChangeTs = Date.now();
        consecutiveUp = 0;
        consecutiveDown = 0;
        currentLevel = lvl;

        if (badgeEl) {
          if (currentLevel === 0) {
            badgeEl.textContent = 'Baseline / ベースライン';
          } else {
            badgeEl.textContent = 'Level ' + currentLevel + ' / レベル' + currentLevel;
          }
          badgeEl.classList.remove('level-0', 'level-1', 'level-2', 'level-3', 'level-4', 'level-5');
          badgeEl.classList.add('level-' + currentLevel);
        }

        // Server may broadcast force_level to keep all clients synced.
        if (sendLevelChange !== false) {
          sendWs({ type: 'level_change', level: currentLevel });
        }
        loadVideoForLevel(currentLevel, true);
      }

      function applyAdaptiveSuggestion(suggestion, fearIndex) {
        if (!suggestion) return;
        if (!phobiaId) return;
        if (fearIndexEl && fearIndex != null) fearIndexEl.textContent = 'Index: ' + (Number(fearIndex).toFixed(2));

        var now = Date.now();
        if (suggestion === 'up' && currentLevel < 5) {
          consecutiveUp++;
          consecutiveDown = 0;
          if (consecutiveUp >= HYSTERESIS_COUNT && (now - lastLevelChangeTs) >= COOLDOWN_UP_MS) {
            setLevelTo(currentLevel + 1, true);
          }
        } else if (suggestion === 'down' && currentLevel > 0) {
          consecutiveDown++;
          consecutiveUp = 0;
          if (consecutiveDown >= HYSTERESIS_COUNT && (now - lastLevelChangeTs) >= COOLDOWN_DOWN_MS) {
            setLevelTo(currentLevel - 1, true);
          }
        } else {
          consecutiveUp = 0;
          consecutiveDown = 0;
        }
      }

      function sendWs(msg) {
        if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(msg));
      }

      function startExperiment(payload) {
        phobiaId = payload && payload.phobia_id ? String(payload.phobia_id) : null;
        phobiaName = payload && payload.phobia_name ? String(payload.phobia_name) : phobiaId;
        experimentId = payload && payload.experiment_id ? String(payload.experiment_id) : 'session';
        durationSeconds = payload && payload.duration_seconds != null ? parseFloat(payload.duration_seconds) : null;
        if (!phobiaId) return;

        if (contentData) {
          if (phobiaId === 'baseline' && contentData.baseline && contentData.baseline.name) {
            phobiaName = contentData.baseline.name;
          } else if (contentData.phobias) {
            var found = contentData.phobias.find(function (p) { return p.id === phobiaId; });
            if (found && found.name) phobiaName = found.name;
          }
        }

        // Level: default to 1..5; fallback to 2 for older messages.
        var lvl = payload && payload.level != null ? parseInt(payload.level, 10) : 2;
        if (isNaN(lvl)) lvl = 2;
        lvl = Math.max(0, Math.min(5, lvl));

        // Duration fallback: use content.json duration_seconds if present.
        if (durationSeconds == null || isNaN(durationSeconds)) {
          durationSeconds = 0;
          if (lvl === 0 && contentData && contentData.phobias) {
            var ph = contentData.phobias.find(function (p) { return p.id === phobiaId; });
            if (ph && ph.baseline && ph.baseline.duration_seconds != null) {
              durationSeconds = parseFloat(ph.baseline.duration_seconds || 0);
            }
          } else if (contentData && contentData.phobias) {
            var ph2 = contentData.phobias.find(function (p) { return p.id === phobiaId; });
            var lv = ph2 && ph2.levels && ph2.levels.find(function (x) { return x.level_number === lvl; });
            durationSeconds = parseFloat(lv && lv.duration_seconds ? lv.duration_seconds : 0);
          }
        }
        durationSeconds = Math.max(0, isNaN(durationSeconds) ? 0 : durationSeconds);

        showExperimentUI();

        currentLevel = lvl;
        if (badgeEl) {
          if (currentLevel === 0) {
            badgeEl.textContent = 'Baseline / ベースライン';
          } else {
            badgeEl.textContent = 'Level ' + currentLevel + ' / レベル' + currentLevel;
          }
          badgeEl.classList.remove('level-0', 'level-1', 'level-2', 'level-3', 'level-4', 'level-5');
          badgeEl.classList.add('level-' + currentLevel);
        }
        if (phobiaLabelEl) phobiaLabelEl.textContent = phobiaName || phobiaId;

        if (statusEl) statusEl.textContent = 'Starting…';

        function doLoadAndSchedule() {
          loadVideoForLevel(currentLevel, true);

          // Timer: auto-stop after duration_seconds (server will save CSV).
          if (stopTimer) { clearTimeout(stopTimer); stopTimer = null; }
          if (durationSeconds > 0) {
            stopTimer = setTimeout(function () {
              endExperiment('timeout');
            }, durationSeconds * 1000);
          }
        }

        if (contentData) doLoadAndSchedule();
        else if (contentDataPromise && typeof contentDataPromise.then === 'function') {
          contentDataPromise.then(function () { doLoadAndSchedule(); }).catch(function () { doLoadAndSchedule(); });
        } else {
          doLoadAndSchedule();
        }
      }

      function stopExperimentUI() {
        if (stopTimer) { clearTimeout(stopTimer); stopTimer = null; }
        if (videoEl) { try { videoEl.pause(); } catch (e) {} }
        showWaitingUI();
      }

      function endExperiment(reason) {
        // Ask recorder to save+stop, then return to waiting UI.
        sendWs({ type: 'stop' });
        stopExperimentUI();
      }

      document.getElementById('emergency-exit').addEventListener('click', function () {
        endExperiment('emergency');
      });

      // Load content.json once (for phobia names, levels and duration fallback).
      contentDataPromise = fetch(typeof assetUrl === 'function' ? assetUrl('data/content.json') : 'data/content.json')
        .then(function (r) { return r.json(); })
        .then(function (data) { contentData = data; return data; })
        .catch(function () { contentData = null; return null; });

      if (videoEl) {
        videoEl.addEventListener('timeupdate', updateProgress);
        videoEl.addEventListener('loadedmetadata', updateProgress);
      }

      function connectWebSocket() {
        setWsStatus('connecting', 'WebSocket: Connecting…');
        try {
          ws = new WebSocket(getWsUrl());
          ws.onopen = function () { setWsStatus('connected', 'WebSocket: Connected'); };
          ws.onmessage = function (ev) {
            try {
              var data = JSON.parse(ev.data);
              if (data.type === 'adaptive_state') {
                if (autoAdaptationEnabled) applyAdaptiveSuggestion(data.level_suggestion, data.fear_index);
              } else if (data.type === 'force_level') {
                setLevelTo(data.level, false);
              } else if (data.type === 'auto_adaptation_toggle') {
                autoAdaptationEnabled = !!data.enabled;
              } else if (data.type === 'start_experiment') {
                startExperiment(data);
              } else if (data.type === 'stop_video') {
                stopExperimentUI();
              } else if (data.status === 'stopped') {
                stopExperimentUI();
              }
            } catch (e) {}
          };
          ws.onclose = function () { setWsStatus('disconnected', 'WebSocket: Disconnected'); };
          ws.onerror = function () { setWsStatus('disconnected', 'WebSocket: Connection failed'); };
        } catch (e) {
          setWsStatus('disconnected', 'WebSocket: Error - ' + e.message);
        }
      }

      // If opened with ?vr=1, try to enter VR automatically.
      document.querySelector('a-scene').addEventListener('loaded', function () {
        var scene = document.querySelector('a-scene');
        var params = new URLSearchParams(window.location.search);
        if (params.get('vr') === '1' && scene && scene.enterVR) {
          setTimeout(function () { scene.enterVR(); }, 300);
        }
      });

      connectWebSocket();
      showWaitingUI();
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VR Phobia Exposure — Choose Level</title>
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <script>
    AFRAME.registerComponent('vr-raise-content', {
      schema: { offsetY: { type: 'number', default: 0.8 } },
      init: function () {
        var self = this;
        this.scene = this.el.sceneEl;
        this.scene.addEventListener('enter-vr', function () { self.el.setAttribute('position', '0 ' + self.data.offsetY + ' 0'); });
        this.scene.addEventListener('exit-vr', function () { self.el.setAttribute('position', '0 0 0'); });
      }
    });
    AFRAME.registerComponent('vr-camera-height', {
      schema: { height: { type: 'number', default: 2.0 } },
      tick: function () {
        if (this.el.sceneEl.is('vr-mode')) this.el.object3D.position.y = this.data.height;
      }
    });
  </script>
  <link rel="stylesheet" href="css/shared.css" />
  <style>
    html, body { margin: 0; overflow: hidden; background: var(--bg-dark) !important; min-height: 100vh; }
    #ui-overlay {
      position: fixed; top: 0; left: 0; right: 0; padding: 12px 16px;
      background: rgba(10, 14, 20, 0.92); backdrop-filter: blur(12px);
      color: var(--text-primary); font-size: 14px; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border-subtle);
    }
    #phobia-title { color: var(--text-secondary); }
    #phobia-title strong { color: var(--text-primary); }
    #emergency-exit { padding: 8px 16px; background: var(--accent-danger); color: #fff; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
    #emergency-exit:hover { background: var(--accent-danger-hover); }
    /* Modo 2D para selección de nivel */
    #level-2d {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: var(--bg-dark); padding: 80px 24px 24px; overflow-y: auto;
    }
    #level-2d.active { display: block; }
    #level-2d .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--accent-primary); text-decoration: none; margin-bottom: 24px; font-size: 0.9rem; }
    #level-2d .back-link:hover { text-decoration: underline; }
    #level-2d .grid { max-width: 700px; margin: 0 auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    @media (max-width: 600px) { #level-2d .grid { grid-template-columns: 1fr; } }
    #level-2d .level-card-2d {
      background: var(--bg-card); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg); padding: 24px;
      cursor: pointer; transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      text-align: center;
    }
    #level-2d .level-card-2d:hover {
      transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    #level-2d .level-card-2d.level-1:hover { border-color: var(--level-1); }
    #level-2d .level-card-2d.level-2:hover { border-color: var(--level-2); }
    #level-2d .level-card-2d.level-3:hover { border-color: var(--level-3); }
    #level-2d .level-card-2d h3 { margin: 0 0 4px; font-size: 1.1rem; }
    #level-2d .level-card-2d .intensity { font-size: 0.9rem; margin: 8px 0; }
    #level-2d .level-card-2d .tags { font-size: 0.8rem; color: var(--text-muted); }
    a-scene { display: block; width: 100%; height: 100vh; }
  </style>
</head>
<body>
  <div id="ui-overlay">
    <span id="phobia-title"><strong id="phobia-name">—</strong> — Choose level (1–3) / レベル選択（1–3）</span>
    <div>
      <button id="btn-enter-vr" type="button" style="display: none; padding: 8px 14px; background: var(--accent-primary); color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-right: 8px;">Enter VR / VRに入る</button>
      <button id="emergency-exit" class="btn-emergency">EMERGENCY EXIT / 緊急終了</button>
    </div>
  </div>

  <!-- Modo 2D para nivel (por defecto, más fácil en desktop) -->
  <div id="level-2d">
    <div style="max-width: 700px; margin: 0 auto;">
      <a href="menu.html" class="back-link">← Back to menu / メニューに戻る</a>
      <div class="grid" id="level-grid-2d"></div>
      <p style="text-align:center; margin-top: 20px;">
        <a href="#" id="show-vr-mode" style="color: var(--accent-primary); font-size: 0.9rem;">View in VR 3D mode / VR 3Dモードで表示</a>
      </p>
    </div>
  </div>

  <a-scene embedded id="level-scene" vr-hover-scale="camera: #level-cam" fog="type: linear; color: #0a0e14; near: 4; far: 18">
    <a-entity id="camera-rig" position="0 1.6 0" vr-camera-height="height: 2.0">
      <a-entity id="level-cam" camera look-controls position="0 0 0"
        cursor="rayOrigin: mouse" raycaster="objects: .clickable"></a-entity>
      <a-entity hand-tracking-controls="hand: left; modelStyle: mesh" raycaster="objects: .clickable; far: 5" hand-pose-sync hand-pinch-cursor hand-laser-visual position="0 0 0"></a-entity>
      <a-entity hand-tracking-controls="hand: right; modelStyle: mesh" raycaster="objects: .clickable; far: 5" hand-pose-sync hand-pinch-cursor hand-laser-visual position="0 0 0"></a-entity>
    </a-entity>

    <a-entity id="level-content" vr-raise-content="offsetY: 0.8">
    <a-sky color="#0a0e14"></a-sky>

    <!-- Floor -->
    <a-circle position="0 0 -2" radius="3" color="#0d1117" opacity="0.4" material="side: double; transparent: true"></a-circle>

    <!-- Instruction -->
    <a-entity position="0 2.9 -1.2">
      <a-text value="Look at a level — wait or click / レベルを見て待つかクリック" anchor="center" align="center" width="2.8" color="#6b7280" font-size="0.16"></a-text>
    </a-entity>

    <!-- Level 1–3: English text (default font) -->
    <a-entity id="level-1" class="clickable level-card" position="-1.2 2.5 -1.5" scale="1 1 1" data-level="1">
      <a-plane width="1.48" height="0.88" color="#0d1117" position="0 0 -0.01" class="clickable"></a-plane>
      <a-plane width="1.4" height="0.8" color="#1a2e1a" position="0 0 0" class="clickable"></a-plane>
      <a-text value="Level 1" anchor="center" align="center" position="0 0.14 0.01" color="#fff" width="1.2" font-size="0.28"></a-text>
      <a-text value="Mild" anchor="center" align="center" position="0 -0.14 0.01" color="#8fbc8f" width="1.1" font-size="0.2"></a-text>
    </a-entity>

    <a-entity id="level-2" class="clickable level-card" position="0 2.5 -1.5" scale="1 1 1" data-level="2">
      <a-plane width="1.48" height="0.88" color="#0d1117" position="0 0 -0.01" class="clickable"></a-plane>
      <a-plane width="1.4" height="0.8" color="#2e2a1a" position="0 0 0" class="clickable"></a-plane>
      <a-text value="Level 2" anchor="center" align="center" position="0 0.14 0.01" color="#fff" width="1.2" font-size="0.28"></a-text>
      <a-text value="Medium" anchor="center" align="center" position="0 -0.14 0.01" color="#daa520" width="1.1" font-size="0.2"></a-text>
    </a-entity>

    <a-entity id="level-3" class="clickable level-card" position="1.2 2.5 -1.5" scale="1 1 1" data-level="3">
      <a-plane width="1.48" height="0.88" color="#0d1117" position="0 0 -0.01" class="clickable"></a-plane>
      <a-plane width="1.4" height="0.8" color="#2e1a1a" position="0 0 0" class="clickable"></a-plane>
      <a-text value="Level 3" anchor="center" align="center" position="0 0.14 0.01" color="#fff" width="1.2" font-size="0.28"></a-text>
      <a-text value="Strong" anchor="center" align="center" position="0 -0.14 0.01" color="#cd5c5c" width="1.1" font-size="0.2"></a-text>
    </a-entity>

    <!-- Back to menu -->
    <a-entity id="back" class="clickable vr-back-btn" position="0 2.0 -1.5" scale="1 1 1">
      <a-plane width="1.28" height="0.48" color="#0d1117" position="0 0 -0.01" class="clickable"></a-plane>
      <a-plane width="1.2" height="0.4" color="#2a2a35" position="0 0 0" class="clickable"></a-plane>
      <a-text value="Back to menu" anchor="center" align="center" position="0 0 0.01" color="#8ab4f8" width="1"></a-text>
    </a-entity>

    <a-light type="ambient" intensity="0.5"></a-light>
    <a-light type="directional" position="2 3 2" intensity="0.9"></a-light>
    <a-light type="point" position="0 2 -1" intensity="0.25" color="#5b9cf5"></a-light>
    </a-entity>
  </a-scene>

  <script src="js/vr-ui.js"></script>
  <script src="js/app-base.js"></script>
  <script src="js/logger.js"></script>
  <script>
    document.querySelector('a-scene').addEventListener('loaded', function () {
      var el = document.querySelector('a-scene');
      if (el && el.renderer) el.renderer.setClearColor(0x0a0e14);
    });
    (function () {
      AFRAME.registerComponent('hand-pose-sync', {
        tick: function () {
          var comp = this.el.components['hand-tracking-controls'];
          if (!comp || !comp.wristObject3D) return;
          var wrist = comp.wristObject3D;
          var parent = this.el.parentEl && this.el.parentEl.object3D;
          if (!parent) return;
          var THREE = AFRAME.THREE;
          var pos = this._pos || (this._pos = new THREE.Vector3());
          var quat = this._quat || (this._quat = new THREE.Quaternion());
          var parentQuat = this._parentQuat || (this._parentQuat = new THREE.Quaternion());
          wrist.getWorldPosition(pos);
          parent.worldToLocal(pos);
          this.el.object3D.position.copy(pos);
          wrist.getWorldQuaternion(quat);
          parent.getWorldQuaternion(parentQuat);
          this.el.object3D.quaternion.copy(quat).premultiply(parentQuat.clone().invert());
        }
      });

      AFRAME.registerComponent('hand-pinch-cursor', {
        init: function () {
          var self = this;
          this.el.addEventListener('pinchended', function () {
            var raycaster = self.el.components.raycaster;
            if (!raycaster) return;
            var els = raycaster.intersectedEls || (raycaster.intersections && raycaster.intersections.length ? [raycaster.intersections[0].object.el].filter(Boolean) : []);
            var target = els[0];
            if (!target) return;
            while (target && !target.classList.contains('clickable')) target = target.parentEl;
            if (target) target.emit('click');
          });
        }
      });

      AFRAME.registerComponent('hand-laser-visual', {
        init: function () {
          var el = this.el;
          var rayLength = 5;
          this.rayLength = rayLength;
          this.lineEl = document.createElement('a-entity');
          this.lineEl.setAttribute('geometry', 'primitive: cylinder; radius: 0.006; height: ' + rayLength);
          this.lineEl.setAttribute('material', 'color: #00d4ff; opacity: 0.85; transparent: true');
          this.lineEl.setAttribute('rotation', '90 0 0');
          this.lineEl.setAttribute('position', '0 0 ' + (-rayLength / 2));
          this.cursorEl = document.createElement('a-entity');
          this.cursorEl.setAttribute('geometry', 'primitive: ring; radiusInner: 0.015; radiusOuter: 0.025');
          this.cursorEl.setAttribute('material', 'color: #00d4ff; side: double');
          this.cursorEl.setAttribute('rotation', '90 0 0');
          this.cursorEl.setAttribute('position', '0 0 -' + rayLength);
          el.appendChild(this.lineEl);
          el.appendChild(this.cursorEl);
        },
        tick: function () {
          var raycaster = this.el.components.raycaster;
          if (!raycaster) return;
          var dist = this.rayLength;
          if (raycaster.intersections && raycaster.intersections.length > 0 && raycaster.intersections[0].distance !== undefined) {
            dist = Math.min(raycaster.intersections[0].distance, this.rayLength);
          }
          this.lineEl.setAttribute('geometry', 'primitive: cylinder; radius: 0.006; height: ' + dist);
          this.lineEl.setAttribute('position', '0 0 ' + (-dist / 2));
          this.cursorEl.setAttribute('position', '0 0 -' + dist);
        }
      });
    })();
    var phobiaId = sessionStorage.getItem('vr_phobia_id');
    var phobiaName = sessionStorage.getItem('vr_phobia_name');
    if (!phobiaId) {
      window.location.href = 'menu.html';
      throw new Error('No phobia selected');
    }
    document.getElementById('phobia-name').textContent = phobiaName || phobiaId;

    // Mostrar modo 2D por defecto (más fácil en desktop)
    var level2d = document.getElementById('level-2d');
    var levelScene = document.getElementById('level-scene');
    level2d.classList.add('active');
    if (levelScene) levelScene.style.display = 'none';

    // Poblar grid 2D con niveles desde content.json
    fetch(typeof assetUrl === 'function' ? assetUrl('data/content.json') : 'data/content.json')
      .then(function (res) { return res.json(); })
      .then(function (data) {
        var phobia = data.phobias && data.phobias.find(function (p) { return p.id === phobiaId; });
        var levels = (phobia && phobia.levels) || [
          { level_number: 1, intensity_tags: ['Mild', 'Lower intensity', '軽い'] },
          { level_number: 2, intensity_tags: ['Medium', 'Medium intensity', '中程度'] },
          { level_number: 3, intensity_tags: ['Strong', 'Higher intensity', '強い'] }
        ];
        var grid = document.getElementById('level-grid-2d');
        var labels = { 1: 'Mild / 軽い', 2: 'Medium / 中程度', 3: 'Strong / 強い' };
        var colors = { 1: 'var(--level-1)', 2: 'var(--level-2)', 3: 'var(--level-3)' };
        levels.forEach(function (lvl) {
          var n = lvl.level_number;
          var card = document.createElement('div');
          card.className = 'level-card-2d level-' + n;
          card.setAttribute('data-level', n);
          card.innerHTML = '<h3>Level ' + n + ' / レベル' + n + '</h3><div class="intensity" style="color:' + colors[n] + '">' + (labels[n] || '') + '</div><div class="tags">' + (lvl.intensity_tags ? lvl.intensity_tags.join(' · ') : '') + '</div>';
          card.addEventListener('click', function () {
            var level = parseInt(card.getAttribute('data-level'), 10);
            var videoId = phobiaId + '_level' + level;
            if (window.VRPhobiaLogger) VRPhobiaLogger.levelSelected(phobiaId, level, videoId);
            sessionStorage.setItem('vr_level', level);
            sessionStorage.setItem('vr_video_id', videoId);
            window.location.href = 'player.html';
          });
          grid.appendChild(card);
        });
      })
      .catch(function () {
        var grid = document.getElementById('level-grid-2d');
        [1, 2, 3].forEach(function (n) {
          var card = document.createElement('div');
          card.className = 'level-card-2d level-' + n;
          card.setAttribute('data-level', n);
          card.innerHTML = '<h3>Level ' + n + ' / レベル' + n + '</h3><div class="intensity">' + (n === 1 ? 'Mild / 軽い' : n === 2 ? 'Medium / 中程度' : 'Strong / 強い') + '</div>';
          card.addEventListener('click', function () {
            var videoId = phobiaId + '_level' + n;
            if (window.VRPhobiaLogger) VRPhobiaLogger.levelSelected(phobiaId, n, videoId);
            sessionStorage.setItem('vr_level', n);
            sessionStorage.setItem('vr_video_id', videoId);
            window.location.href = 'player.html';
          });
          grid.appendChild(card);
        });
      });

    document.getElementById('emergency-exit').addEventListener('click', function () {
      if (window.VRPhobiaLogger) VRPhobiaLogger.emergencyExit(phobiaId, null, 'user_triggered');
      window.location.href = 'index.html';
    });

    function onLevelCardClick() {
      var card = this;
      while (card && !card.classList.contains('level-card')) card = card.parentEl;
      if (!card) return;
      var level = parseInt(card.getAttribute('data-level'), 10);
      var videoId = phobiaId + '_level' + level;
      if (window.VRPhobiaLogger) VRPhobiaLogger.levelSelected(phobiaId, level, videoId);
      sessionStorage.setItem('vr_level', level);
      sessionStorage.setItem('vr_video_id', videoId);
      window.location.href = 'player.html';
    }
    function onBackClick() {
      var btn = this;
      while (btn && !btn.classList.contains('vr-back-btn')) btn = btn.parentEl;
      if (btn) window.location.href = 'menu.html';
    }
    document.querySelectorAll('.level-card').forEach(function (card) {
      card.addEventListener('click', onLevelCardClick);
      card.querySelectorAll('.clickable').forEach(function (el) {
        el.addEventListener('click', onLevelCardClick);
      });
    });
    document.querySelectorAll('.vr-back-btn').forEach(function (btn) {
      btn.addEventListener('click', onBackClick);
      btn.querySelectorAll('.clickable').forEach(function (el) {
        el.addEventListener('click', onBackClick);
      });
    });

    document.getElementById('show-vr-mode').addEventListener('click', function (e) {
      e.preventDefault();
      level2d.classList.remove('active');
      if (levelScene) levelScene.style.display = 'block';
      var btnVr = document.getElementById('btn-enter-vr');
      if (btnVr) btnVr.style.display = '';
    });
    var btnEnterVr = document.getElementById('btn-enter-vr');
    if (btnEnterVr && levelScene) {
      btnEnterVr.addEventListener('click', function () {
        if (levelScene.enterVR) levelScene.enterVR();
      });
    }
  </script>
</body>
</html>
